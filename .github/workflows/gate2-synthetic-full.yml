name: Gate 2 synthetic full experiment

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate canonical data
        run: python scripts/validate_draws.py data/draws.json
      - name: Run full synthetic experiment
        run: PYTHONPATH=. python scripts/run_gate2_synthetic.py --draw-count 1230 --null-calibration 1000 --null-validation 1000 --positive 100 --alpha 0.001 --json-output reports/gate2_3_full_summary.json --markdown-output reports/gate2_3_full_summary.md
      - name: Upload full reports
        uses: actions/upload-artifact@v4
        with:
          name: gate2-3-full-experiment
          path: reports/gate2_3_full_summary.*
          retention-days: 30
