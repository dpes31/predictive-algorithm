name: Product full UI Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - "product/dynamic_prediction.py"
      - "public/**"
      - "tests/test_product_full_ui.py"
      - "tests/local_preview_server.py"
      - "tests/preview_smoke.mjs"
      - "vercel.json"
      - ".python-version"
      - ".github/workflows/product-full-ui.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  PREVIEW_URL: "https://predictive-algorithm-git-fix-restore-fu-b8fb58-dpes31s-projects.vercel.app"

jobs:
  regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run full UI contract tests
        run: python -m unittest tests.test_product_full_ui -v
      - name: Run Product regression suite
        run: python -m unittest discover -s tests -p 'test_product_*.py' -v

  local-browser-smoke:
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 15
    env:
      PREVIEW_URL: "http://127.0.0.1:4173"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Start exact local Preview server
        run: |
          mkdir -p preview-artifacts
          python tests/local_preview_server.py --port 4173 > preview-artifacts/local-server.log 2>&1 &
          echo $! > preview-artifacts/local-server.pid
          for attempt in $(seq 1 20); do
            if curl -fsS "$PREVIEW_URL/api/archive" >/tmp/archive.json && python -c 'import json; p=json.load(open("/tmp/archive.json")); assert p["record_count"] == 1230'; then
              exit 0
            fi
            sleep 1
          done
          cat preview-artifacts/local-server.log
          exit 1
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Run actual browser click verification locally
        run: node tests/preview_smoke.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-product-ui-local-browser-evidence
          path: preview-artifacts/
          if-no-files-found: error
          retention-days: 30

  remote-preview-smoke:
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 15
    steps:
      - name: Check Vercel Preview accessibility
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p preview-artifacts
          root_code="$(curl -sS -L -o /tmp/root.html -w '%{http_code}' "$PREVIEW_URL/" || true)"
          archive_code="$(curl -sS -L -o /tmp/archive.json -w '%{http_code}' "$PREVIEW_URL/api/archive" || true)"
          root_marker="$(grep -c 'DYNAMIC TARGET' /tmp/root.html 2>/dev/null || true)"
          printf '{"root_http":"%s","archive_http":"%s","root_marker":%s}\n' "$root_code" "$archive_code" "$root_marker" > preview-artifacts/remote-access.json
          echo "root_http=$root_code archive_http=$archive_code root_marker=$root_marker"
          echo "archive_body=$(head -c 500 /tmp/archive.json 2>/dev/null || true)"
          if [ "$root_code" != "200" ] || [ "$archive_code" != "200" ] || [ "$root_marker" != "1" ]; then
            echo "Vercel Preview is protected by Vercel Authentication; remote browser verification cannot proceed without a bypass or public Preview access." >&2
            exit 1
          fi
          python -c 'import json; p=json.load(open("/tmp/archive.json")); assert p["record_count"] == 1230 and p["last_draw"] == 1230'
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Run actual browser click verification on Vercel Preview
        run: node tests/preview_smoke.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-product-ui-remote-preview-evidence
          path: preview-artifacts/
          if-no-files-found: warn
          retention-days: 30
