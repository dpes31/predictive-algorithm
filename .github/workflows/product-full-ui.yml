name: Product full UI verification

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - "product/dynamic_prediction.py"
      - "public/**"
      - "tests/test_product_full_ui.py"
      - "tests/test_product_production_closeout.py"
      - "tests/local_preview_server.py"
      - "tests/preview_smoke.mjs"
      - "vercel.json"
      - ".python-version"
      - ".github/workflows/product-full-ui.yml"
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "product/dynamic_prediction.py"
      - "public/**"
      - "tests/test_product_full_ui.py"
      - "tests/test_product_production_closeout.py"
      - "tests/local_preview_server.py"
      - "tests/preview_smoke.mjs"
      - "vercel.json"
      - ".python-version"
      - ".github/workflows/product-full-ui.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run full UI contract tests
        run: |
          python -m unittest \
            tests.test_product_full_ui \
            tests.test_product_production_closeout \
            -v
      - name: Run Product regression suite
        run: python -m unittest discover -s tests -p 'test_product_*.py' -v

  local-browser-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 15
    env:
      PREVIEW_URL: "http://127.0.0.1:4173"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Start exact local Preview server
        run: |
          mkdir -p preview-artifacts
          python tests/local_preview_server.py --port 4173 > preview-artifacts/local-server.log 2>&1 &
          echo $! > preview-artifacts/local-server.pid
          for attempt in $(seq 1 20); do
            if curl -fsS "$PREVIEW_URL/api/archive" >/tmp/archive.json && python -c 'import json; p=json.load(open("/tmp/archive.json")); assert p["record_count"] == 1230'; then
              exit 0
            fi
            sleep 1
          done
          cat preview-artifacts/local-server.log
          exit 1
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Run actual browser click verification locally
        run: node tests/preview_smoke.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-product-ui-local-browser-evidence
          path: preview-artifacts/
          if-no-files-found: error
          retention-days: 30

  production-browser-smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 10
    env:
      PREVIEW_URL: "https://predictive-algorithm.vercel.app"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Wait for Production deployment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p preview-artifacts
          for attempt in $(seq 1 20); do
            root_code="$(curl -sS -L -o /tmp/root.html -w '%{http_code}' "$PREVIEW_URL/" || true)"
            archive_code="$(curl -sS -L -o /tmp/archive.json -w '%{http_code}' "$PREVIEW_URL/api/archive" || true)"
            if [ "$root_code" = "200" ] && [ "$archive_code" = "200" ] && grep -q 'DYNAMIC TARGET' /tmp/root.html && python -c 'import json; p=json.load(open("/tmp/archive.json")); assert p["record_count"] == 1230 and p["first_draw"] == 1 and p["last_draw"] == 1230 and len(p["records"]) == 1230'; then
              echo "Production is ready on attempt $attempt"
              exit 0
            fi
            echo "Production not ready: attempt=$attempt root=$root_code archive=$archive_code"
            sleep 15
          done
          exit 1
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Run actual browser click verification on Production
        run: node tests/preview_smoke.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-product-ui-production-evidence
          path: preview-artifacts/
          if-no-files-found: error
          retention-days: 30
