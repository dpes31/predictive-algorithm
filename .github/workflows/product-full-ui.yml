name: Product full UI Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - "product/dynamic_prediction.py"
      - "public/**"
      - "tests/test_product_full_ui.py"
      - "tests/preview_smoke.mjs"
      - "vercel.json"
      - ".python-version"
      - ".github/workflows/product-full-ui.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  PREVIEW_URL: "https://predictive-algorithm-git-fix-restore-fu-b8fb58-dpes31s-projects.vercel.app"

jobs:
  regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run full UI contract tests
        run: python -m unittest tests.test_product_full_ui -v
      - name: Run Product regression suite
        run: python -m unittest discover -s tests -p 'test_product_*.py' -v

  preview-browser-smoke:
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Wait for current Vercel Preview
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 40); do
            html="$(curl -fsSL "$PREVIEW_URL/" 2>/dev/null || true)"
            archive="$(curl -fsSL "$PREVIEW_URL/api/archive" 2>/dev/null || true)"
            if grep -q "DYNAMIC TARGET" <<<"$html" && python -c 'import json,sys; p=json.load(sys.stdin); assert p["record_count"] == 1230 and p["last_draw"] == 1230' <<<"$archive" 2>/dev/null; then
              echo "Preview is ready on attempt $attempt"
              exit 0
            fi
            echo "Preview not ready on attempt $attempt"
            sleep 15
          done
          echo "Preview did not expose the current full UI and archive API in time" >&2
          exit 1
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Run real browser click verification
        run: |
          mkdir -p preview-artifacts
          node tests/preview_smoke.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-product-ui-preview-evidence
          path: preview-artifacts/
          if-no-files-found: error
          retention-days: 30
