name: R3 Development
on:
  workflow_dispatch:
  push:
    branches: [feature/gate2p-r3-dev-grid]
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: PYTHONPATH=. python -m unittest discover -s tests -v
      - run: PYTHONPATH=. python scripts/r3_dev_runner.py --replicates 200 --draw-count 1230 --output r3-dev.json
      - uses: actions/upload-artifact@v4
        with:
          name: r3-dev-result
          path: r3-dev.json
