name: R3 Debug
on:
  pull_request:
    branches:
      - validation/gate2-r3-dev-base
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Unit tests
        run: |
          set -o pipefail
          PYTHONPATH=. python -m unittest discover -s tests -v 2>&1 | tee r3-unit.log
      - name: Upload unit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r3-unit-log
          path: r3-unit.log
