name: Gate 1 frozen data integrity

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/gate1-build.yml"
      - "scripts/validate_draws.py"
      - "scripts/build_archive.py"
      - "tests/test_data_integrity.py"
      - "tests/test_static_contract.py"
      - "data/draws.json"
      - "data/draws.schema.json"
      - "data/checksums.sha256"
      - "app/**"

permissions:
  contents: read

concurrency:
  group: gate1-frozen-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-frozen-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify locked canonical dataset identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum data/draws.json | awk '{print $1}')" = "57bb04ef188b5b06298b8a97fc73174d746de0568e33423f50029de31efa5cf1"
          python scripts/validate_draws.py data/draws.json

      - name: Verify deterministic archive index offline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_archive.py \
            --input data/draws.json \
            --output /tmp/archive_index.json
          cmp --silent app/data/archive_index.json /tmp/archive_index.json

      - name: Run frozen Gate 1 tests only
        run: |
          python -m unittest \
            tests.test_data_integrity \
            tests.test_static_contract \
            -v

      - name: Confirm no external result collection
        run: |
          if grep -nE 'official-verify|dhlottery\.co\.kr|smok95\.github\.io' .github/workflows/gate1-build.yml; then
            echo "External result collection is prohibited in the frozen Gate 1 workflow."
            exit 1
          fi
