name: Gate 1 frozen data integrity

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/gate1-build.yml"
      - "scripts/validate_draws.py"
      - "scripts/build_archive.py"
      - "tests/test_data_integrity.py"
      - "tests/test_static_contract.py"
      - "data/draws.json"
      - "data/draws.schema.json"
      - "data/checksums.sha256"
      - "app/**"

permissions:
  contents: read

concurrency:
  group: gate1-frozen-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-frozen-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify locked canonical dataset identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum data/draws.json | awk '{print $1}')" = "57bb04ef188b5b06298b8a97fc73174d746de0568e33423f50029de31efa5cf1"
          python scripts/validate_draws.py data/draws.json

      - name: Verify archive builder offline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_archive.py \
            --input data/draws.json \
            --output /tmp/archive_index.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/archive_index.json').read_text(encoding='utf-8'))
          assert payload['record_count'] == 1230
          assert payload['first_draw'] == 1
          assert payload['last_draw'] == 1230
          assert len(payload['draws']) == 1230
          assert payload['draws'][0]['draw_no'] == 1230
          assert payload['draws'][-1]['draw_no'] == 1
          PY

      - name: Run frozen Gate 1 tests only
        run: |
          python -m unittest \
            tests.test_data_integrity \
            tests.test_static_contract \
            -v
