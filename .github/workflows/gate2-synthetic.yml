name: Gate 2 synthetic validation R1

on:
  workflow_dispatch:
  push:
    branches: [feature/gate2-synthetic-validation-r1]
  pull_request:
    branches: [feature/gate2-synthetic-validation]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate canonical data
        run: python scripts/validate_draws.py data/draws.json
      - name: Run unit tests
        run: |
          set +e
          PYTHONPATH=. python -m unittest discover -s tests -v > /tmp/unit-tests.log 2>&1
          status=$?
          tail -120 /tmp/unit-tests.log
          exit $status
      - name: Run synthetic smoke
        run: PYTHONPATH=. python scripts/run_gate2_synthetic_r1.py --draw-count 360 --null-calibration 4 --null-validation 3 --positive 1 --alpha 0.20 --json-output /tmp/gate2-3r.json --markdown-output /tmp/gate2-3r.md
