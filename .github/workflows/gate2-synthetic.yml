name: Gate 2 physical evidence engine

on:
  workflow_dispatch:
  push:
    branches: [feature/gate2p2-engine]
  pull_request:
    branches: [feature/gate2-physical-evidence-spec]

permissions:
  contents: read

concurrency:
  group: gate2-physical-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate canonical data
        run: python scripts/validate_draws.py data/draws.json
      - name: Run unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v
      - name: Run deterministic physical smoke twice
        run: |
          PYTHONPATH=. python scripts/run_gate2_physical_smoke.py --draw-count 360 --seed 20260630 --output /tmp/physical-a.json > /tmp/physical-a.log
          PYTHONPATH=. python scripts/run_gate2_physical_smoke.py --draw-count 360 --seed 20260630 --output /tmp/physical-b.json > /tmp/physical-b.log
          cmp /tmp/physical-a.json /tmp/physical-b.json
      - name: Assert research-only contract
        run: python -c "import json; p=json.load(open('/tmp/physical-a.json')); assert p['model_version']=='3.0.0-research'; assert p['research_only'] is True; assert p['public_release_allowed'] is False; assert p['statistical_validation_complete'] is False"
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate2-3p2-physical-smoke
          path: /tmp/physical-a.json
          retention-days: 14
