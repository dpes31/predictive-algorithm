name: Gate 2 synthetic validation

on:
  workflow_dispatch:
  push:
    branches: [feature/gate2-synthetic-validation]
  pull_request:
    branches: [feature/gate2-engine-core]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate canonical data
        run: python scripts/validate_draws.py data/draws.json
      - name: Run unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v
