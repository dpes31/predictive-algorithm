<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="대한민국 로또 6/45 과거 당첨번호 아카이브">
  <title>과거 데이터 · Predictive Algorithm</title>
  <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">PA</span><span><strong>Predictive Algorithm</strong><small>확률예측·검증 연구</small></span></a>
      <nav class="nav" aria-label="주요 메뉴"><a href="./index.html">예측</a><a href="./archive.html" aria-current="page">과거 데이터</a><a href="./update.html">당첨번호 입력</a></nav>
    </header>

    <section class="page-header" aria-labelledby="archive-title">
      <div><p class="eyebrow">CANONICAL + LOCAL OVERLAY</p><h1 id="archive-title">과거 당첨번호</h1><p>canonical 1~1230회와 이 브라우저에 저장한 사용자 입력 회차를 함께 조회합니다.</p></div>
      <div class="data-status" id="data-status" aria-live="polite"><span class="status-dot"></span> 데이터 불러오는 중</div>
    </section>

    <section class="summary-grid" aria-label="데이터 요약">
      <article class="summary-card"><span>전체 표시 회차</span><strong id="summary-count">—</strong></article>
      <article class="summary-card"><span>최신 반영 회차</span><strong id="summary-latest">—</strong></article>
      <article class="summary-card"><span>사용자 입력</span><strong id="summary-overlay">—</strong></article>
      <article class="summary-card"><span>canonical 버전</span><strong class="summary-version" id="summary-version">—</strong></article>
    </section>

    <section class="control-panel" aria-label="검색 및 정렬">
      <label class="field search-field"><span>회차 검색</span><input id="draw-search" inputmode="numeric" type="search" placeholder="예: 1231" autocomplete="off"></label>
      <label class="field"><span>연도</span><select id="year-filter"><option value="all">전체 연도</option></select></label>
      <label class="field"><span>정렬</span><select id="sort-order"><option value="desc">최신 회차부터</option><option value="asc">1회부터</option></select></label>
      <button class="ghost-button" id="reset-filter" type="button">조건 초기화</button>
    </section>

    <section class="archive-layout">
      <div>
        <div class="section-heading"><div><p class="eyebrow">DRAW RESULTS</p><h2>당첨번호</h2></div><span id="visible-count">0개 결과</span></div>
        <div class="draw-list" id="draw-list" aria-live="polite"></div>
        <button class="load-more" id="load-more" type="button" hidden>더 보기</button>
      </div>
      <aside class="statistics-panel" aria-label="번호별 통계">
        <div class="section-heading"><div><p class="eyebrow">REFERENCE STATS</p><h2>번호별 출현</h2></div></div>
        <p class="panel-notice">과거 출현 통계는 설명 자료이며 다음 회차의 당첨확률 우위를 의미하지 않습니다.</p>
        <label class="field"><span>집계 구간</span><select id="stat-window"><option value="all">전체 회차</option><option value="52">최근 52회</option><option value="30">최근 30회</option><option value="10">최근 10회</option></select></label>
        <div class="frequency-grid" id="frequency-grid"></div>
      </aside>
    </section>

    <template id="draw-card-template">
      <article class="draw-card">
        <div class="draw-card-head"><div><strong class="draw-number"></strong><time class="draw-date"></time></div><span class="verification-badge"></span></div>
        <div class="ball-row main-balls" aria-label="당첨번호"></div>
        <div class="bonus-row"><span>보너스</span><div class="ball-row bonus-ball"></div></div>
        <details class="draw-details"><summary>데이터 상세 보기</summary><dl><div><dt>출처</dt><dd class="draw-source"></dd></div><div><dt>상태</dt><dd class="draw-status"></dd></div><div><dt>체크섬</dt><dd class="draw-checksum"></dd></div></dl></details>
      </article>
    </template>
  </main>
  <script src="./assets/js/data-store.js"></script>
  <script src="./assets/js/archive.js"></script>
</body>
</html>
